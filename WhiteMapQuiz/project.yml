name: WhiteMapQuiz
schemes:
  WhiteMapQuiz:
    build:
      targets:
        WhiteMapQuiz: all
        WhiteMapQuizTests: [test]
    test:
      targets:
        - WhiteMapQuizTests
    run:
      config: Debug

options:
  bundleIdPrefix: com.whitemap
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "15.0"
  minimumXcodeGenVersion: "2.30"

targets:
  WhiteMapQuiz:
    type: application
    platform: iOS
    supportedDestinations: [iOS, macOS]
    sources:
      - path: WhiteMapQuiz
        excludes:
          - "**/*.xcassets"
    resources:
      - path: WhiteMapQuiz/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.whitemap.WhiteMapQuiz
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        SWIFT_VERSION: "5.10"
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"
      configs:
        debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        release:
          SWIFT_COMPILATION_MODE: wholemodule

  WhiteMapQuizTests:
    type: bundle.unit-test
    platform: iOS
    supportedDestinations: [iOS, macOS]
    sources:
      - path: WhiteMapQuizTests
    dependencies:
      - target: WhiteMapQuiz
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.whitemap.WhiteMapQuizTests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.10"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/WhiteMapQuiz.app/Contents/MacOS/WhiteMapQuiz"
